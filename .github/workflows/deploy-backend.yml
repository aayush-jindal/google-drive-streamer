name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  PROJECT_ID: rasik-labs
  REGION: asia-south1
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE: asia-south1-docker.pkg.dev/rasik-labs/rasik-labs/streamer-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push image
        working-directory: backend
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy streamer-backend \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars FRONTEND_URL=https://stream.rasiklabs.com \
            --set-secrets GOOGLE_SERVICE_ACCOUNT_JSON=streamer-sa-key:latest \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300

