# Development — Vite dev server + local API server with hot module reload.
# Access from browser / Fire Stick at: http://<your-mac-ip>:5173
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot reload
      - .:/app
      # Keep node_modules from the image (don't overwrite with host)
      - /app/node_modules
    # .env.local is read directly by Vite (for VITE_* vars) and by dev-server.js
    # (for GOOGLE_SERVICE_ACCOUNT_JSON). Docker env_file can't parse JSON values.
    environment:
      - CHOKIDAR_USEPOLLING=true  # Reliable file watching inside Docker
