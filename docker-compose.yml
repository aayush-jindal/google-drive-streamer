# Local development — same as docker-compose.dev.yml.
# Production deployment is handled by Vercel (see vercel.json).
#
# Usage:
#   docker compose up --build
#   Open http://localhost:5173

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    # .env.local is read directly by Vite and dev-server.js — Docker
    # env_file can't parse the multi-line GOOGLE_SERVICE_ACCOUNT_JSON value.
    environment:
      - CHOKIDAR_USEPOLLING=true
